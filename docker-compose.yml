version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: volunteer_mongodb
    # Khởi động MongoDB với Replica Set tên là rs0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      # Mẹo: Tự động initiate Replica Set nếu chưa được khởi tạo
      test: ["CMD", "mongosh", "--eval", "rs.status().ok || rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]}).ok"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: volunteer_backend
    ports:
      - "8000:8000"
    environment:
      # URL cần có tham số replicaSet=rs0 để hỗ trợ ACID Transactions
      - MONGODB_URL=mongodb://mongodb:27017/volunteer_db?replicaSet=rs0
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
