version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: volunteer_connect_backend
    ports:
      - "8080:8080"
    environment:
      # Khi chạy qua Docker Compose, đổi MONGODB_URL trỏ về tên service mongodb
      - MONGODB_URL=mongodb://mongodb:27017/volunteer_connect?replicaSet=rs0
      - DATABASE_NAME=volunteer_connect
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - vc_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Truyền biến này vào Stage 1 (Builder) của Dockerfile
        - VITE_API_URL=http://localhost:8080/api
    container_name: volunteer_connect_frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - vc_network
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: volunteer_connect_mongodb
    ports:
      - "27017:27017"
    # Lệnh bật chế độ Replica Set (rs0) cho MongoDB ngay từ lúc khởi động
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    # MẸO: Dùng Healthcheck để tự động gõ lệnh rs.initiate() cấu hình Single-Node Replica Set
    healthcheck:
      test: |
        mongosh --port 27017 --eval "
        try {
          rs.status().ok
        } catch (err) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'localhost:27017' }]
          })
        }"
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - mongodb_data:/data/db
    networks:
      - vc_network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  vc_network:
    driver: bridge
